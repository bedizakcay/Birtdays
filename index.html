<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>BirthdayBox</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;font-family:'Nunito',sans-serif;color:#fff}
input::placeholder{color:rgba(255,255,255,0.3)}
select option{background:#1a1a2e}
input[type=file]{display:none}
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.75);display:flex;align-items:center;justify-content:center;z-index:999}
.popbox{background:linear-gradient(135deg,#1a1a2e,#0f3460);border:2px solid rgba(255,215,0,0.5);border-radius:28px;padding:32px 24px;text-align:center;max-width:320px;width:90%;animation:popin 0.4s ease}
@keyframes popin{from{transform:scale(0.7);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes fall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(105vh) rotate(720deg);opacity:0}}
.cp{position:fixed;top:-20px;border-radius:3px;animation:fall 3s ease-in forwards;pointer-events:none;z-index:998}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">

const {useState,useEffect,useRef} = React;
const EMOJIS=["🎂","🎉","🎈","🎁","🥳","🌟","💫","🎊"];
const COLORS=[["#FF6B6B","#FFE66D"],["#A8EDEA","#FED6E3"],["#D4FC79","#96E6A1"],["#FFA07A","#FFD700"],["#C9FFBF","#FFAFBD"],["#FBC2EB","#A6C1EE"],["#FDDB92","#D1FDFF"],["#FFECD2","#FCB69F"]];
const MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];

function daysUntil(m,d){
  const t=new Date();
  let n=new Date(t.getFullYear(),m-1,d);
  if(n<t) n=new Date(t.getFullYear()+1,m-1,d);
  const diff=Math.ceil((n-t)/(864e5));
  return diff===365?0:diff;
}
function calcAge(y,m,d){
  if(!y) return null;
  const t=new Date();
  let a=t.getFullYear()-y;
  if(t.getMonth()+1<m||(t.getMonth()+1===m&&t.getDate()<d)) a--;
  return a;
}
function nxtAge(y,m,d){
  if(!y) return null;
  const a=calcAge(y,m,d);
  return daysUntil(m,d)===0?a:a+1;
}

function confetti(){
  const cols=["#FFD700","#FF6B6B","#A78BFA","#4ECDC4","#FF8E53","#fff"];
  for(let i=0;i<50;i++){
    const e=document.createElement("div");
    e.className="cp";
    e.style.cssText=`left:${Math.random()*100}vw;width:${Math.random()*10+6}px;height:${Math.random()*10+6}px;background:${cols[Math.floor(Math.random()*cols.length)]};border-radius:${Math.random()>.5?"50%":"3px"};animation-delay:${Math.random()*2}s`;
    document.body.appendChild(e);
    setTimeout(()=>e.remove(),4000);
  }
}

function playJingle(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [523,659,784,1047].forEach((f,i)=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=f;o.type="sine";
      const t=ctx.currentTime+i*0.18;
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(0.3,t+0.05);
      g.gain.linearRampToValueAtTime(0,t+0.35);
      o.start(t);o.stop(t+0.35);
    });
  }catch(e){}
}

function Popup({list,onClose}){
  useEffect(()=>{confetti();playJingle();},[]);
  return(
    <div className="overlay" onClick={onClose}>
      <div className="popbox" onClick={e=>e.stopPropagation()}>
        <div style={{fontSize:60,marginBottom:8}}>🎂</div>
        <div style={{fontSize:22,fontWeight:900,background:"linear-gradient(90deg,#FFD700,#FF6B6B)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",marginBottom:18}}>
          {list.length===1?"Happy Birthday!":"Birthdays Today! 🎉"}
        </div>
        {list.map(b=>(
          <div key={b.id} style={{background:"rgba(255,255,255,0.08)",borderRadius:16,padding:"12px 16px",marginBottom:10,display:"flex",alignItems:"center",gap:12,textAlign:"left"}}>
            {b.photo
              ?<img src={b.photo} alt={b.name} style={{width:50,height:50,borderRadius:"50%",objectFit:"cover",border:"2px solid #FFD700",flexShrink:0}}/>
              :<div style={{width:50,height:50,borderRadius:"50%",background:`linear-gradient(135deg,${b.color[0]},${b.color[1]})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,flexShrink:0}}>{b.emoji}</div>
            }
            <div>
              <div style={{fontWeight:900,fontSize:17}}>{b.name}</div>
              {b.year&&<div style={{fontSize:13,color:"rgba(255,255,255,0.6)"}}>Turning {nxtAge(+b.year,b.month,b.day)} today! 🥳</div>}
            </div>
          </div>
        ))}
        <button onClick={onClose} style={{width:"100%",background:"linear-gradient(135deg,#FFD700,#FF6B6B)",border:"none",borderRadius:16,padding:14,color:"#1a1a2e",fontSize:16,fontWeight:900,cursor:"pointer",marginTop:8}}>
          🎉 Celebrate!
        </button>
      </div>
    </div>
  );
}

function App(){
  const [bdays,setBdays]=useState(()=>{try{return JSON.parse(localStorage.getItem("bdbox")||"[]")}catch{return[]}});
  const [view,setView]=useState("home");
  const [form,setForm]=useState({name:"",day:"",month:"",year:"",photo:null});
  const [saved,setSaved]=useState(false);
  const [search,setSearch]=useState("");
  const [popup,setPopup]=useState(null);
  const [notif,setNotif]=useState(typeof Notification!=="undefined"&&Notification.permission==="granted");
  const fileRef=useRef();

  useEffect(()=>{try{localStorage.setItem("bdbox",JSON.stringify(bdays))}catch{}},[bdays]);

  useEffect(()=>{
    const key="bdbox_check";
    const today=new Date().toDateString();
    if(localStorage.getItem(key)===today) return;
    localStorage.setItem(key,today);
    const td=bdays.filter(b=>daysUntil(b.month,b.day)===0);
    if(td.length>0) setTimeout(()=>setPopup(td),800);
    if(typeof Notification!=="undefined"&&Notification.permission==="granted"){
      bdays.forEach(b=>{
        const d=daysUntil(b.month,b.day);
        if(d===0) new Notification("🎂 Happy Birthday!",{body:`Today is ${b.name}'s birthday!`});
        else if(d===1) new Notification("🎁 Birthday Tomorrow!",{body:`${b.name}'s birthday is tomorrow!`});
        else if(d===7) new Notification("📅 Birthday in 1 Week!",{body:`${b.name}'s birthday is in 7 days!`});
      });
    }
  },[bdays]);

  async function enableNotif(){
    if(typeof Notification==="undefined") return;
    const r=await Notification.requestPermission();
    setNotif(r==="granted");
  }

  const sorted=[...bdays].sort((a,b)=>daysUntil(a.month,a.day)-daysUntil(b.month,b.day));
  const filtered=sorted.filter(b=>b.name.toLowerCase().includes(search.toLowerCase()));
  const todayList=sorted.filter(b=>daysUntil(b.month,b.day)===0);
  const weekList=sorted.filter(b=>{const d=daysUntil(b.month,b.day);return d>0&&d<=7});

  function handlePhoto(e){
    const f=e.target.files[0];
    if(!f) return;
    const r=new FileReader();
    r.onload=ev=>setForm(x=>({...x,photo:ev.target.result}));
    r.readAsDataURL(f);
  }

  function addBday(){
    if(!form.name||!form.day||!form.month) return;
    const emoji=EMOJIS[Math.floor(Math.random()*EMOJIS.length)];
    const color=COLORS[Math.floor(Math.random()*COLORS.length)];
    setBdays(p=>[...p,{...form,id:Date.now(),emoji,color}]);
    setForm({name:"",day:"",month:"",year:"",photo:null});
    setSaved(true);
    if(typeof Notification!=="undefined"&&Notification.permission==="default") enableNotif();
    setTimeout(()=>{setSaved(false);setView("home")},1200);
  }

  function del(id){setBdays(p=>p.filter(b=>b.id!==id))}

  const Ava=({b,sz=52})=>b.photo
    ?<img src={b.photo} alt={b.name} style={{width:sz,height:sz,borderRadius:"50%",objectFit:"cover",border:"2px solid rgba(255,255,255,0.2)",flexShrink:0}}/>
    :<div style={{width:sz,height:sz,borderRadius:"50%",background:`linear-gradient(135deg,${b.color[0]}55,${b.color[1]}55)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:sz*0.48,flexShrink:0,border:"2px solid rgba(255,255,255,0.15)"}}>{b.emoji}</div>;

  const Card=({b,showDel})=>{
    const d=daysUntil(b.month,b.day);
    const ca=b.year?calcAge(+b.year,b.month,b.day):null;
    const na=b.year?nxtAge(+b.year,b.month,b.day):null;
    return(
      <div style={{borderRadius:20,background:`linear-gradient(135deg,${b.color[0]}22,${b.color[1]}22)`,border:`1px solid ${b.color[0]}44`,padding:"12px 14px",display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
        <Ava b={b}/>
        <div style={{flex:1}}>
          <div style={{fontWeight:800,fontSize:16,marginBottom:2}}>{b.name}</div>
          <div style={{fontSize:12,color:"rgba(255,255,255,0.5)"}}>{MONTHS[b.month-1]} {b.day}{b.year?`, ${b.year}`:""}</div>
          {ca!==null&&<div style={{fontSize:12,color:"rgba(255,255,255,0.6)",marginTop:2}}>{d===0?`🎉 Turns ${na} today!`:`Age ${ca} → turning ${na}`}</div>}
        </div>
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6}}>
          <div style={{background:d===0?"linear-gradient(135deg,#FFD700,#FF6B6B)":`linear-gradient(135deg,${b.color[0]},${b.color[1]})`,borderRadius:12,padding:"6px 10px",textAlign:"center",minWidth:48}}>
            <div style={{fontSize:18,fontWeight:900,color:"#1a1a2e",lineHeight:1}}>{d===0?"🎂":d}</div>
            {d>0&&<div style={{fontSize:10,color:"#1a1a2e",fontWeight:700,opacity:0.7}}>days</div>}
          </div>
          {showDel&&<button onClick={()=>del(b.id)} style={{background:"rgba(255,255,255,0.08)",border:"none",borderRadius:10,color:"rgba(255,255,255,0.4)",width:30,height:30,cursor:"pointer",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>}
        </div>
      </div>
    );
  };

  const inp={width:"100%",background:"rgba(255,255,255,0.08)",border:"2px solid rgba(255,255,255,0.12)",borderRadius:16,padding:"14px 16px",color:"#fff",fontSize:16,fontFamily:"inherit",outline:"none",marginBottom:14};
  const hdr={fontSize:32,fontWeight:900,margin:0,background:"linear-gradient(90deg,#FFD700,#FF6B6B,#A78BFA)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"};

  return(
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#1a1a2e,#16213e,#0f3460)",maxWidth:430,margin:"0 auto"}}>

      {popup&&<Popup list={popup} onClose={()=>setPopup(null)}/>}

      {!notif&&bdays.length>0&&typeof Notification!=="undefined"&&Notification.permission!=="denied"&&(
        <div onClick={enableNotif} style={{background:"linear-gradient(135deg,#7C3AED,#4F46E5)",padding:"10px 18px",display:"flex",alignItems:"center",gap:10,cursor:"pointer"}}>
          <span style={{fontSize:20}}>🔔</span>
          <span style={{fontSize:13,fontWeight:700,flex:1}}>Tap to enable birthday notifications!</span>
          <span style={{fontSize:18}}>→</span>
        </div>
      )}

      {view==="home"&&(
        <div style={{paddingBottom:90}}>
          <div style={{padding:"28px 24px 16px",textAlign:"center"}}>
            <h1 style={hdr}>🎂 BirthdayBox</h1>
            <p style={{fontSize:13,color:"rgba(255,255,255,0.5)",marginTop:4}}>Never miss a special day</p>
            {notif&&<div style={{fontSize:11,color:"#4ade80",marginTop:6,fontWeight:700}}>🔔 Notifications ON</div>}
          </div>
          {todayList.map(b=>(
            <div key={b.id} style={{margin:"0 16px 12px",borderRadius:20,background:"linear-gradient(135deg,#FF6B6B,#FFD700)",padding:"14px 18px",display:"flex",alignItems:"center",gap:14,boxShadow:"0 8px 24px rgba(255,107,107,0.4)"}}>
              <Ava b={b} sz={56}/>
              <div>
                <div style={{fontWeight:800,fontSize:13,color:"#1a1a2e"}}>🎉 Today's Birthday!</div>
                <div style={{fontWeight:900,fontSize:20,color:"#1a1a2e"}}>{b.name}</div>
                {b.year&&<div style={{fontSize:12,color:"#1a1a2e",opacity:0.7}}>Turns {nxtAge(+b.year,b.month,b.day)} today!</div>}
              </div>
            </div>
          ))}
          <div style={{display:"flex",gap:10,padding:"0 16px 16px"}}>
            {[[bdays.length,"Total","#FFD700"],[todayList.length,"Today","#FF6B6B"],[weekList.length,"This Week","#A78BFA"]].map(([n,l,c])=>(
              <div key={l} style={{flex:1,background:"rgba(255,255,255,0.08)",borderRadius:16,padding:"14px 10px",textAlign:"center",border:"1px solid rgba(255,255,255,0.1)"}}>
                <div style={{fontSize:28,fontWeight:900,color:c}}>{n}</div>
                <div style={{fontSize:11,color:"rgba(255,255,255,0.5)",marginTop:4}}>{l}</div>
              </div>
            ))}
          </div>
          {weekList.length>0&&<>
            <div style={{padding:"4px 20px 10px",fontSize:13,fontWeight:700,textTransform:"uppercase",letterSpacing:1.5,color:"rgba(255,255,255,0.4)"}}>⚡ Coming This Week</div>
            <div style={{padding:"0 16px"}}>{weekList.map(b=><Card key={b.id} b={b} showDel={false}/>)}</div>
          </>}
          {bdays.length===0&&(
            <div style={{textAlign:"center",padding:"48px 24px",color:"rgba(255,255,255,0.3)"}}>
              <div style={{fontSize:64,marginBottom:16}}>🎈</div>
              <div style={{fontSize:16}}>No birthdays yet!</div>
              <div style={{marginTop:8,fontSize:13}}>Tap + to add your first one</div>
            </div>
          )}
        </div>
      )}

      {view==="all"&&(
        <div style={{paddingBottom:90}}>
          <div style={{padding:"28px 24px 16px",textAlign:"center"}}>
            <h1 style={hdr}>📋 All Birthdays</h1>
            <p style={{fontSize:13,color:"rgba(255,255,255,0.5)",marginTop:4}}>{bdays.length} people saved</p>
          </div>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍  Search by name..." style={{...inp,margin:"0 16px 14px",width:"calc(100% - 32px)"}}/>
          <div style={{padding:"0 16px"}}>
            {filtered.length===0&&(
              <div style={{textAlign:"center",padding:"48px 24px",color:"rgba(255,255,255,0.3)"}}>
                <div style={{fontSize:48,marginBottom:12}}>{bdays.length===0?"🎁":"🔍"}</div>
                <div>{bdays.length===0?"Add some birthdays!":"No results found"}</div>
              </div>
            )}
            {filtered.map(b=><Card key={b.id} b={b} showDel={true}/>)}
          </div>
        </div>
      )}

      {view==="add"&&(
        <div style={{padding:"28px 20px 100px"}}>
          <div style={{fontSize:26,fontWeight:900,marginBottom:24}}>🎉 Add Birthday</div>
          {saved
            ?<div style={{textAlign:"center",padding:"48px 0"}}>
              <div style={{fontSize:64}}>🎂</div>
              <div style={{fontSize:20,fontWeight:800,marginTop:12}}>Saved!</div>
            </div>
            :<>
              <div style={{marginBottom:14,display:"flex",alignItems:"center",gap:14}}>
                <div onClick={()=>fileRef.current.click()} style={{width:72,height:72,borderRadius:"50%",overflow:"hidden",flexShrink:0,cursor:"pointer",border:"2px dashed rgba(255,255,255,0.25)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,background:"rgba(255,255,255,0.06)"}}>
                  {form.photo?<img src={form.photo} style={{width:"100%",height:"100%",objectFit:"cover"}}/>:"📷"}
                </div>
                <input ref={fileRef} type="file" accept="image/*" capture="environment" onChange={handlePhoto}/>
                <button onClick={()=>fileRef.current.click()} style={{flex:1,background:"rgba(255,255,255,0.08)",border:"2px dashed rgba(255,255,255,0.2)",borderRadius:16,padding:14,color:"rgba(255,255,255,0.6)",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>
                  {form.photo?"📷 Change photo":"📷 Add photo\n(optional)"}
                </button>
              </div>
              <input value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="Full name" style={inp}/>
              <div style={{display:"flex",gap:10}}>
                <select value={form.month} onChange={e=>setForm(f=>({...f,month:+e.target.value}))} style={{...inp,flex:1.5}}>
                  <option value="">Month</option>
                  {MONTHS.map((m,i)=><option key={m} value={i+1}>{m}</option>)}
                </select>
                <select value={form.day} onChange={e=>setForm(f=>({...f,day:+e.target.value}))} style={{...inp,flex:1}}>
                  <option value="">Day</option>
                  {Array.from({length:31},(_,i)=>i+1).map(d=><option key={d} value={d}>{d}</option>)}
                </select>
              </div>
              <input value={form.year} onChange={e=>setForm(f=>({...f,year:e.target.value}))} placeholder="Birth year (optional — for age)" type="number" min="1900" max={new Date().getFullYear()} style={inp}/>
              <button onClick={addBday} disabled={!form.name||!form.day||!form.month} style={{width:"100%",background:"linear-gradient(135deg,#FFD700,#FF6B6B)",border:"none",borderRadius:18,padding:16,color:"#1a1a2e",fontSize:17,fontWeight:900,cursor:"pointer",opacity:(!form.name||!form.day||!form.month)?0.4:1,boxShadow:"0 8px 24px rgba(255,107,107,0.3)"}}>
                Add Birthday 🎂
              </button>
            </>
          }
        </div>
      )}

      <nav style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:"rgba(10,15,35,0.97)",backdropFilter:"blur(20px)",borderTop:"1px solid rgba(255,255,255,0.08)",display:"flex",padding:"10px 0 18px"}}>
        {[["home","🏠","Home"],["add","＋","Add"],["all","📋","All"]].map(([v,icon,label])=>(
          <button key={v} onClick={()=>setView(v)} style={{flex:1,background:"none",border:"none",color:view===v?"#FFD700":"rgba(255,255,255,0.3)",display:"flex",flexDirection:"column",alignItems:"center",gap:3,cursor:"pointer",fontSize:v==="add"?30:22,transition:"color 0.2s"}}>
            <span>{icon}</span>
            <span style={{fontSize:10,fontWeight:700,letterSpacing:0.5}}>{label}</span>
          </button>
        ))}
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
